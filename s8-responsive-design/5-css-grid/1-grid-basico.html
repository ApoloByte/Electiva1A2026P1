<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid - Básico</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>CSS Grid Layout</h1>

    <h2>Ejemplo 1: grid-template-columns</h2>
    <div class="grid-1">
        <div class="caja">1</div>
        <div class="caja">2</div>
        <div class="caja">3</div>
        <div class="caja">4</div>
        <div class="caja">5</div>
        <div class="caja">6</div>
    </div>

    <h2>Ejemplo 2: grid-template-areas</h2>
    <div class="grid-2">
        <header class="area-header">Header</header>
        <nav class="area-nav">Nav</nav>
        <main class="area-main">Main</main>
        <aside class="area-aside">Aside</aside>
        <footer class="area-footer">Footer</footer>
    </div>

    <h2>Ejemplo 3: repeat(auto-fit, minmax())</h2>
    <div class="grid-3">
        <div class="caja">Card 1</div>
        <div class="caja">Card 2</div>
        <div class="caja">Card 3</div>
        <div class="caja">Card 4</div>
        <div class="caja">Card 5</div>
    </div>
</body>
</html>
