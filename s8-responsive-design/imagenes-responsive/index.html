<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imágenes Responsive | Snaider Reyes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <h1>Imágenes & Media Responsive</h1>
    </header>

    <main class="main">
        <!-- SRCSET -->
            <h2>srcset + sizes</h2>
            <img class="responsive-img" src="https://images.unsplash.com/photo-1503023345310-bd7c1de61c7d?w=400" srcset="
                                         https://images.unsplash.com/photo-1503023345310-bd7c1de61c7d?w=320 320w,
                                         https://images.unsplash.com/photo-1503023345310-bd7c1de61c7d?w=640 640w,
                                         https://images.unsplash.com/photo-1503023345310-bd7c1de61c7d?w=1024 1024w"
                sizes="(max-width: 640px) 100vw, 50vw" alt="Paisaje responsive">
        </section>

        <!-- PICTURE -->
        <section class="picture-section">
            <h2>Elemento &lt;picture&gt;</h2>
            <picture>
                <source media="(max-width: 768px)"
                    srcset="https://images.unsplash.com/photo-1529333166437-7750a6dd5a70?w=400&h=600&fit=crop">
            
                <source media="(min-width: 769px)"
                    srcset="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=800&h=400&fit=crop">
            
                <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=400&h=300" alt="Imagen adaptativa">
            </picture>
        </section>

        <!-- VIDEO RESPONSIVE -->
        <section class="video-section">
            <h2>Video Responsive</h2>
            <video class="responsive-video" controls poster="https://images.unsplash.com/photo-1492724441997-5dc865305da7?w=800">
                <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
                Tu navegador no soporta video.
            </video>
        </section>

        <!-- OBJETO FIT -->
        <section class="object-fit-section">
            <h2>object-fit</h2>
            <div class="imagenes-object-fit">
                <img src="https://images.unsplash.com/photo-1519681393784-d120267933ba?w=400&h=300&fit=crop" alt="Cover"
                    class="object-cover">
            
                <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=400&h=300&fit=crop" alt="Contain"
                    class="object-contain">
            </div>
        </section>
    </main>
</body>
</html>
