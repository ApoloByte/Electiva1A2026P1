<!DOCTYPE html>
<html lang="es">
<head>

    <title>Investigación CSS Grid</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="grid-layout">
        <header>Header (Logo / Título)</header>
        <nav>Navegación</nav>
        <main>
            <h2>Contenido Principal</h2>
            <p>Aquí es donde aplicamos CSS Grid para organizar el corazón de la interfaz.</p>
            
            <h3>Galería Dinamica (Auto-fit + Minmax)</h3>
            <div class="galeria-grid">
                <div class="tarjeta">Tarjeta 1</div>
                <div class="tarjeta">Tarjeta 2</div>
                <div class="tarjeta">Tarjeta 3</div>
                <div class="tarjeta">Tarjeta 4</div>
            </div>
        </main>
        <aside>Barra Lateral (Publicidad)</aside>
        <footer>Pie de Página</footer>
    </div>

</body>
