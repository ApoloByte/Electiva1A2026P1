<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Grid Layout</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
    }

    .contenedor {
      display: grid;

      /* Estructura principal */
      grid-template-areas:
        "header header"
        "nav main"
        "footer footer";

      grid-template-columns: 200px 1fr;
      grid-template-rows: auto 1fr auto;
      gap: 10px;
      height: 100vh;
    }

    header {
      grid-area: header;
      background: rgb(227, 7, 7);
      color: white;
      padding: 20px;
      text-align: center;
    }

    nav {
      grid-area: nav;
      background: rgb(212, 136, 136);
      color: white;
      padding: 20px;
    }

    main {
      grid-area: main;
      background: rgb(215, 153, 171);
      padding: 20px;
    }

    footer {
      grid-area: footer;
      background: rgb(161, 63, 63);
      color: rgb(255, 249, 249);
      text-align: center;
      padding: 10px;
    }

    /* 📱 RESPONSIVE */
    @media (max-width: 600px) {
      .contenedor {
        grid-template-areas:
          "header"
          "nav"
          "main"
          "footer";

        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <div class="contenedor">

    <header>
      <h1>EJEMPLO DE PAGINA </h1>
    </header>

    <nav>
      <p>Inicio</p>
      <p>Menu</p>
      <p>Contacto</p>
    </nav>

    <main>
      <h2>Contenido principal</h2>
      <p>Aquí va la información principal de la pagina wed</p>
    </main>

    <footer>
      <p>Pie de página</p>
    </footer>

  </div>

</body>
</html>
