<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox & Grid Básico | Snaider Reyes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <h1>Flexbox & Grid Responsive</h1>
    </header>

    <main class="main">
        <!-- Flexbox Section -->
        <section class="flexbox-section">
            <h2>Flexbox - Tarjetas Responsive</h2>
            <div class="tarjetas-flex">
                <div class="tarjeta">Tarjeta 1</div>
                <div class="tarjeta">Tarjeta 2</div>
                <div class="tarjeta">Tarjeta 3</div>
            </div>
        </section>

        <!-- Grid Section -->
        <section class="grid-section">
            <h2>Grid - Layout Responsive</h2>
            <div class="contenedor-grid">
                <div class="item">1</div>
                <div class="item">2</div>
                <div class="item">3</div>
                <div class="item">4</div>
                <div class="item">5</div>
                <div class="item">6</div>
            </div>
        </section>
    </main>
</body>
</html>
