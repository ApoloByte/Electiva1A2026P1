<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diseño Fijo vs Responsive</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Diseño Fijo vs Responsive</h1>
    <p>Redimensiona la ventana para ver las diferencias.</p>

    <h2>Diseño Fijo (usa px)</h2>
    <div class="caja-fija">300px de ancho fijo</div>

    <h2>Diseño Responsive (usa %)</h2>
    <div class="caja-responsive">50% del ancho</div>

    <h2>Comparación lado a lado</h2>
    <div class="comparacion">
        <div class="columna">
            <h3>Fijo</h3>
            <p>No se adapta</p>
        </div>
        <div class="columna">
            <h3>Flexible</h3>
            <p>Se adapta al espacio</p>
        </div>
    </div>
</body>
</html>
