<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid - Ejemplos</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1 class="titulo-principal">Implementación de CSS Grid</h1>

<section class="seccion">
    <h2>Ejemplo 1: Grid basico (3 columnas).</h2>

    <div class="grid-basico">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
        <div class="item">5</div>
        <div class="item">6</div>
    </div>
</section>

<section class="seccion">
    <h2>Ejemplo 2: Grid con áreas nombradas</h2>

    <div class="grid-areas">
        <div class="header">Header</div>
        <div class="aside">Sidebar</div>
        <div class="main">Contenido</div>
        <div class="footer">Footer</div>
    </div>
</section>

<section class="seccion">
    <h2>Ejemplo 3: Grid responsivo</h2>

    <div class="grid-responsive">
        <div class="item">A</div>
        <div class="item">B</div>
        <div class="item">C</div>
        <div class="item">D</div>
        <div class="item">E</div>
        <div class="item">F</div>
    </div>
</section>

</body>
</html>
