<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Flexbox - Dirección y Envoltorio</h1>

    <h2>flex-direction: row</h2>
    <div class="contenedor row">
        <div class="caja">1</div>
        <div class="caja">2</div>
        <div class="caja">3</div>
    </div>

    <h2>flex-direction: column</h2>
    <div class="contenedor column">
        <div class="caja">1</div>
        <div class="caja">2</div>
        <div class="caja">3</div>
    </div>

    <h2>flex-wrap: wrap</h2>
    <div class="contenedor wrap">
        <div class="caja">1</div>
        <div class="caja">2</div>
        <div class="caja">3</div>
        <div class="caja">4</div>
        <div class="caja">5</div>
        <div class="caja">6</div>
    </div>

    <h2>justify-content: space-between</h2>
    <div class="contenedor justify">
        <div class="caja">A</div>
        <div class="caja">B</div>
        <div class="caja">C</div>
    </div>
</body>
</html>
