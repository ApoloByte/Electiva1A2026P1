<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fijo vs Responsive</title>
  <link rel="stylesheet" href="style.css"> //se llama al Style
</head>
<body>
  <h1>Comparación de diseños</h1>

  <section class="demo-fijo">
    <h2>Diseño fijo</h2>
    <div class="contenedor-fijo">
      <p>Este contenedor siempre mide 800px, sin importar el tamaño de pantalla.</p>
    </div>
  </section>

  <section class="demo-responsive">
    <h2>Diseño responsive</h2>
    <div class="contenedor-responsive">
      <p>Este contenedor ocupa el 90% del ancho disponible y nunca supera los 800px.</p>
    </div>
  </section>
</body>
</html>
