<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejemplo simple</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      text-align: center;
    }

    header {
      background: steelblue;
      color: white;
      padding: 1em;
    }

    nav {
      background: lightgray;
      padding: 1em;
    }

    nav a {
      margin: 0 10px;
      text-decoration: none;
      color: black;
    }

    /* Consulta de medios: si la pantalla es menor a 600px */
    @media (max-width: 600px) {
      nav {
        display: flex;
        flex-direction: column; /* Menú en columna */
      }

      nav a {
        margin: 5px 0;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Mi página sencilla</h1>
  </header>
  <nav>
    <a href="#">Inicio</a>
    <a href="#">Servicios</a>
    <a href="#">Contacto</a>
  </nav>
</body>
</html>
