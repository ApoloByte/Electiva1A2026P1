<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menú responsive</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
    }

    header {
      background-color: #df0b0b;
      color: white;
      padding: 15px;
      text-align: center;
    }

    nav {
      display: flex;
      justify-content: center;
      background-color: #ef8080;
    }

    nav a {
      color: white;
      padding: 14px 20px;
      text-decoration: none;
    }

    nav a:hover {
      background-color: #777;
    }

    /* 📱 Media query */
    @media (max-width: 600px) {
      nav {
        flex-direction: column;
        align-items: center;
      }

      nav a {
        width: 100%;
        text-align: center;
        border-top: 1px solid #ccc;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>EJEMPLO</h1>
  </header>

  <nav>
    <a href="#">Inicio</a>
    <a href="#">Menu</a>
    <a href="#">Contacto</a>
  </nav>

</body>
</html>
