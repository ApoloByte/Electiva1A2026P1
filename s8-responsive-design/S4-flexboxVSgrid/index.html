<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejemplo Flexbox Responsive</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <h1>Mi Página Web</h1>
    <nav>
      <ul class="menu">
        <li>Inicio</li>
        <li>Servicios</li>
        <li>Contacto</li>
      </ul>
    </nav>
  </header>

  <!-- CONTENIDO PRINCIPAL -->
  <main class="main">
    <section class="contenido">
      <h2>Contenido principal</h2>
      <p>
        Este es un ejemplo de diseño usando Flexbox. 
        Se adapta automáticamente a diferentes tamaños de pantalla.
      </p>
    </section>

    <aside class="sidebar">
      <h3>Barra lateral</h3>
      <p>Información adicional</p>
    </aside>
  </main>
</body>
</html>
