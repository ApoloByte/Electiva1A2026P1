<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tipografía Responsive | Snaider Reyes/title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="hero">
        <h1 class="hero-title">Tipografía<br>Responsive</h1>
        <p class="hero-subtitle">Clamp, rem, vw, vh en acción</p>
    </header>

    <main class="main">
        <section class="demo-section">
            <h2 class="demo-title">Ejemplo 1: clamp()</h2>
            <div class="demo-text">
                <h3>Heading H3</h3>
                <p>Este párrafo usa <code>clamp(1rem, 2.5vw, 1.125rem)</code> para tamaño fluido.</p>
            </div>
        </section>

        <section class="demo-section">
            <h2 class="demo-title">Ejemplo 2: Escala fluida</h2>
            <div class="cards">
                <div class="card">
                    <h3 class="card-title">Tarjeta 1</h3>
                    <p class="card-text">Texto que se adapta perfectamente.</p>
                </div>
                <div class="card">
                    <h3 class="card-title">Tarjeta 2</h3>
                    <p class="card-text">Texto que se adapta perfectamente.</p>
                </div>
                <div class="card">
                    <h3 class="card-title">Tarjeta 3</h3>
                    <p class="card-text">Texto que se adapta perfectamente.</p>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
