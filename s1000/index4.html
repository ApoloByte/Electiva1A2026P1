<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unidades Flexibles</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    .px {
      width: 500px;
      background-color: red;
      color: white;
      margin-bottom: 20px;
      padding: 20px;
    }

    .porcentaje {
      width: 100%;
      background-color: blue;
      color: white;
      padding: 20px;
    }
  </style>
</head>
<body>

  <h1>Unidades: px vs %</h1>

  <div class="px">
    Caja con ancho fijo (500px)
  </div>

  <div class="porcentaje">
    Caja con ancho flexible (100%)
  </div>

</body>
</html>
