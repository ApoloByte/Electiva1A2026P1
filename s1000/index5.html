<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Imagenes Responsivas</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    .normal {
      width: 600px;
      margin-bottom: 20px;
    }

    .responsive {
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body>

  <h1>Imagen sin responsive</h1>
  <img class="normal" src="https://picsum.photos/600">

  <h1>Imagen responsive</h1>
  <img class="responsive" src="https://picsum.photos/600">

</body>
</html>
