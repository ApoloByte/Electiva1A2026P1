<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Actividad JS — Tipos y Strings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Courier New', monospace;
      background: #0d1117;
      color: #c9d1d9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    h1 { color: #58a6ff; margin-bottom: .5rem; font-size: 1.4rem; }
    p  { color: #8b949e; font-size: .95rem; }
    .console-hint {
      margin-top: 2rem;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 1.2rem 1.8rem;
      max-width: 520px;
      text-align: center;
    }
    kbd {
      background: #21262d;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 2px 7px;
      color: #f0f6fc;
      font-size: .9rem;
    }
  </style>
</head>
<body>
  <h1>Actividad JavaScript</h1>
  <p>Actividad en la consola.</p>

  <!-- El atributo src apunta al archivo con el código JavaScript -->
  <script src="app.js"></script>
</body>
</html>
