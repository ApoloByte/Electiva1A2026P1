<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huskie Gallery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">Navbar</a>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link" href="./index.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="./huskie.html">Huskie</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="./position.html">Position</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <section class="container my-5">
        <h2 class="husky-title text-center mb-4">Galería Husky</h2>
        
        <div id="huskyCarousel" class="carousel slide carousel-fade custom-husky-carousel" data-bs-ride="carousel">
            <div class="carousel-indicators">
                <button type="button" data-bs-target="#huskyCarousel" data-bs-slide-to="0" class="active"></button>
                <button type="button" data-bs-target="#huskyCarousel" data-bs-slide-to="1"></button>
            </div>
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/f/f5/Siberian_Husky_-_Mika.jpg" class="d-block w-100" alt="Husky">
                    <div class="carousel-caption">
                        <h2>Siberian Husky</h2>
                        <p>Diseño exclusivo para la página de Huskies.</p>
                    </div>
                </div>
                <div class="carousel-item">
                    <img src="https://cdn.wamiz.fr/cdn-cgi/image/format=auto,quality=80,width=1200,height=600,fit=cover/animal/breed/dog/adult/668c0c22a4bcf765839764.jpg" class="d-block w-100" alt="Husky 2">
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#huskyCarousel" data-bs-slide="prev">
                <span class="control-wrapper"><span class="carousel-control-prev-icon"></span></span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#huskyCarousel" data-bs-slide="next">
                <span class="control-wrapper"><span class="carousel-control-next-icon"></span></span>
            </button>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
