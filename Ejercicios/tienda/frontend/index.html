<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tienda Virtual</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Estilos -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="header">
    <div class="container header-content">
        <h1>Tienda Virtual</h1>
        <span class="badge">Carrito activo</span>
    </div>
</header>

<main class="container main">

    <!-- PRODUCTOS -->
    <section class="section">
        <div class="section-header">
            <h2>Productos</h2>
        </div>
        <div id="products-container" class="grid"></div>
    </section>

    <!-- CARRITO -->
    <section class="section">
        <div class="section-header">
            <h2>Carrito</h2>
        </div>

        <div id="cart-container" class="grid"></div>

        <div class="cart-summary">
            <p id="cart-total">Total: $0</p>
            <button onclick="clearCart()" class="btn-secondary">Vaciar carrito</button>
        </div>
    </section>

</main>

<footer class="footer">
    <div class="container footer-content">

        <div class="footer-top">
            <div>
                <h3>Tienda Virtual</h3>
                <p>Proyecto académico - Ingeniería Informática</p>
            </div>

            <div class="footer-links">
                <a href="#">Inicio</a>
                <a href="#">Productos</a>
                <a href="#">Carrito</a>
            </div>
        </div>

        <div class="footer-bottom">
            <p>© 2026 - Todos los derechos reservados</p>
        </div>

    </div>
</footer>

<script src="app.js"></script>
</body>
</html>
